<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSOLUTO PROJECTS</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
}

/* INTRO (logo principal mantiene tipografía elegante) */
.intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:9999;
  cursor:pointer;
  opacity:1;
  transition:opacity 1.8s ease;
}

.intro.fadeout{
  opacity:0;
  pointer-events:none;
}

#logo{
  font-family:Garamond, serif;
  font-size:16px;
  letter-spacing:4px;
  white-space:nowrap;
  opacity:0.95;
}

/* WEB (tipografía consola) */
.main{
  display:none;
  opacity:0;
  font-family:Consolas,"Courier New",monospace;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:22px 24px;
  box-sizing:border-box;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.brand{
  font-size:11px;
  letter-spacing:6px;
  opacity:0.9;
}

/* MENU ICON */
.menu-btn{
  width:24px;
  cursor:pointer;
}

.menu-btn span{
  display:block;
  height:1px;
  background:white;
  margin:6px 0;
  opacity:0.8;
}

/* MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-280px;
  width:280px;
  height:100vh;
  background:black;
  z-index:300;
  padding:120px 40px;
  box-sizing:border-box;
  transition:0.5s ease;
}

.side-menu.open{
  right:0;
}

.side-menu a{
  display:block;
  color:white;
  text-decoration:none;
  margin-bottom:26px;
  font-size:14px;
  letter-spacing:2px;
  opacity:0.55;
  transition:0.3s;
}

.side-menu a:hover,
.side-menu a.active{
  opacity:1;
}

/* PAGES */
.page{
  display:none;
  min-height:100vh;
  padding:90px 0 40px;
}

.page.active{
  display:block;
}

.hero{
  height:100vh;
  background:url('7.jpeg') center/cover no-repeat;
}

.text{
  max-width:620px;
  margin:70px auto;
  padding:0 25px;
  text-align:center;
  line-height:2;
  font-size:13px;
  opacity:0.65;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
}

.grid img{
  width:100%;
  height:340px;
  object-fit:cover;
}

/* móvil */
@media (max-width:700px){

  #logo{
    font-size:13px;
    letter-spacing:3px;
  }

  .brand{
    font-size:10px;
    letter-spacing:4px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .grid img{
    height:440px;
  }

  .side-menu{
    width:220px;
    right:-220px;
    padding:110px 30px;
  }
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
<source src="ambient.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
<div id="logo">ABSOLUTO PROJECTS</div>
</div>

<!-- WEB -->
<div class="main" id="main">

<div class="header">

<div class="brand">ABSOLUTO</div>

<div class="menu-btn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

</div>

<div class="side-menu" id="sideMenu">
<a href="#" class="active" onclick="showPage('about',this)">ACERCA</a>
<a href="#" onclick="showPage('process',this)">PROCESOS</a>
<a href="#" onclick="showPage('gallery',this)">GALERÍA</a>
</div>

<section id="about" class="page active">
<div class="hero"></div>

<div class="text">
ABSOLUTO PROJECTS explora identidad,
anonimato y transformación.<br><br>

No es una marca tradicional.<br>
Es una estructura visual en evolución.
</div>
</section>

<section id="process" class="page">
<div class="grid">
<img src="7.jpeg">
<img src="IMG_0587.jpeg">
<img src="IMG_5847.jpeg">
<img src="IMG_5941.jpeg">
</div>
</section>

<section id="gallery" class="page">
<div class="grid">
<img src="IMG_0587.jpeg">
<img src="IMG_5941.jpeg">
<img src="7.jpeg">
<img src="IMG_5847.jpeg">
</div>
</section>

</div>

<script>
function enterSite(){

const intro = document.querySelector(".intro");
const main = document.getElementById("main");
const music = document.getElementById("bgmusic");

music.volume = 0.15;
music.play();

intro.classList.add("fadeout");

setTimeout(()=>{
intro.style.display="none";
main.style.display="block";

setTimeout(()=>{
main.style.transition="opacity 2s ease";
main.style.opacity="1";
},50);

},1800);
}

function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("open");
}

function showPage(id,el){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById(id).classList.add('active');

document.querySelectorAll('.side-menu a').forEach(a=>{
a.classList.remove('active');
});

el.classList.add('active');

document.getElementById("sideMenu").classList.remove("open");
}

/* SCRAMBLE INTRO */
const glyphs = [
"𓂀","☿","☽","☉","†","‡","✦","ᛟ","ᚨ","ᛉ",
"✠","⚶","⌘","⟁","☍","☌","✢","✣","✥","✧"
];

const target = "ABSOLUTO PROJECTS";
let iteration = 0;

const interval = setInterval(()=>{

const output = target.split("").map((char,index)=>{

if(char===" ") return " ";

if(index < iteration){
return target[index];
}

return glyphs[Math.floor(Math.random()*glyphs.length)];

}).join("");

document.getElementById("logo").innerHTML = output;

if(iteration >= target.length){
clearInterval(interval);
}

iteration += 0.33;

},70);
</script>

</body>
</html>
