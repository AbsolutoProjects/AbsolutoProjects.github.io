<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABSOLUTO</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Helvetica, Arial, sans-serif;
}

/* LOGO */
.header {
  position: fixed;
  width: 100%;
  text-align: center;
  padding: 20px;
  letter-spacing: 10px;
  font-size: 12px;
  z-index: 10;
}

/* IMAGEN PRINCIPAL */
.hero {
  height: 100vh;
  background: url('https://picsum.photos/1200/1600') center/cover no-repeat;
}

/* GALERÍA */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* TEXTO */
.text {
  padding: 100px 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="header">ABSOLUTO</div>

<div class="hero"></div>

<div class="grid">
  <img src="7.jpeg">
  <img src="https://picsum.photos/401/500">
  <img src="https://picsum.photos/402/500">
  <img src="https://picsum.photos/403/500">
</div>

<div class="text">
  No es una marca.  
  Es un proceso de eliminación.  
  La forma es solo un contenedor.
</div>

</body>
</html>
