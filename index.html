<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSOLUTO PROJECTS</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Garamond, serif;
}

/* INTRO */
.intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:9999;
  cursor:pointer;
  opacity:1;
  transition:opacity 1.8s ease;
}

.intro.fadeout{
  opacity:0;
  pointer-events:none;
}

#logo{
  font-size:16px;      /* ligeramente más grande */
  letter-spacing:4px;
  line-height:1.8;
  opacity:0.95;
  padding:20px;
  white-space:nowrap;
}

/* WEB REAL */
.main{
  display:none;
  opacity:0;
}

.header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:20px;
  letter-spacing:10px;
  font-size:12px;
  z-index:10;
}

.hero{
  height:100vh;
  background:url('7.jpeg') center/cover no-repeat;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
}

.grid img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.text{
  padding:100px 20px;
  max-width:500px;
  margin:auto;
  text-align:center;
  font-size:13px;
  line-height:1.8;
  opacity:0.65;
}

/* móvil */
@media (max-width:700px){

  #logo{
    font-size:14px;
    letter-spacing:3px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .grid img{
    height:420px;
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgmusic" loop>
  <source src="ambient.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
  <div id="logo">ABSOLUTO PROJECTS</div>
</div>

<!-- WEB -->
<div class="main" id="main">

<div class="header">ABSOLUTO</div>

<div class="hero"></div>

<div class="grid">
  <img src="7.jpeg">
  <img src="IMG_0587.jpeg">
  <img src="IMG_5847.jpeg">
  <img src="IMG_5941.jpeg">
</div>

<div class="text">
sin rostro es la identidad.<br>
Aquel que ya ha sanado inspira
Aquel que actúa con conciencia ayuda
Y aquel que elige el bien ilumina.<br>
La ropa es solo un contenedor.
</div>

</div>

<script>
function enterSite(){

  const intro = document.querySelector(".intro");
  const main = document.getElementById("main");
  const music = document.getElementById("bgmusic");

  /* música */
  music.volume = 0.15;
  music.play();

  /* fade out intro */
  intro.classList.add("fadeout");

  setTimeout(() => {

    intro.style.display = "none";
    main.style.display = "block";

    setTimeout(() => {
      main.style.transition = "opacity 2s ease";
      main.style.opacity = "1";
    },50);

  },1800);
}

/* SCRAMBLE MÍSTICO */
const glyphs = [
"𓂀","☿","☽","☉","†","‡","✦","ᛟ","ᚨ","ᛉ",
"✠","⚶","⌘","⟁","☍","☌","✢","✣","✥","✧"
];

const target = "ABSOLUTO PROJECTS";
let iteration = 0;

const interval = setInterval(() => {

  const output = target.split("").map((char,index)=>{

    if(char === " ") return " ";

    if(index < iteration){
      return target[index];
    }

    return glyphs[Math.floor(Math.random()*glyphs.length)];

  }).join("");

  document.getElementById("logo").innerHTML = output;

  if(iteration >= target.length){
    clearInterval(interval);
  }

  iteration += 0.33;

},70);
</script>

</body>
</html>
