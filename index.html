<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABSOLUTO</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: white;
  color: black;
  display: flex;
  justify-content: center;
  align-items: center;
  letter-spacing: 10px;
  font-size: 14px;
  z-index: 999;
  animation: fadeLogo 3s ease;
}

/* animación del logo */
@keyframes fadeLogo {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0.4;}
}

/* OCULTAR INTRO */
.intro.hidden {
  display: none;
}

/* WEB REAL */
.main {
  display: none;
  background: black;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  letter-spacing: 10px;
  font-size: 12px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://picsum.photos/1200/1600') center/cover;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* TEXTO */
.text {
  padding: 80px 20px;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
  ABSOLUTO
</div>

<!-- CONTENIDO REAL -->
<div class="main" id="main">

  <div class="header">ABSOLUTO</div>

  <div class="hero"></div>

  <div class="grid">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>

  <div class="text">
    No es una marca. Es un proceso de eliminación.
  </div>

</div>

<script>
function enterSite() {
  document.querySelector(".intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}
</script>

</body>
</html>
