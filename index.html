<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSOLUTO PROJECTS</title>

<style>

/* FUENTE HIMALAYAN (si subes Himalayan.ttf al repo) */
@font-face {
  font-family: 'Himalayan';
  src: url('Himalayan.ttf') format('truetype');
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Himalayan', Helvetica, Arial, sans-serif;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 999;
  cursor: pointer;
}

#logo {
  font-size: 16px;
  letter-spacing: 6px;
  line-height: 1.8;
  opacity: 0.95;
}

/* WEB REAL */
.main {
  display: none;
}

/* HEADER */
.header {
  position: fixed;
  width: 100%;
  text-align: center;
  padding: 20px;
  letter-spacing: 10px;
  font-size: 12px;
  z-index: 10;
}

/* PORTADA */
.hero {
  height: 100vh;
  background: url('7.jpeg') center/cover no-repeat;
}

/* GALERÍA */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.grid img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* TEXTO */
.text {
  padding: 100px 20px;
  max-width: 500px;
  margin: auto;
  text-align: center;
  font-size: 13px;
  opacity: 0.65;
  line-height: 1.8;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
  <span id="logo">ABSOLUTO<br>PROJECTS</span>
</div>

<!-- WEB -->
<div class="main" id="main">

<div class="header">ABSOLUTO</div>

<div class="hero"></div>

<div class="grid">
  <img src="7.jpeg">
  <img src="IMG_0587.jpeg">
  <img src="IMG_5847.jpeg">
  <img src="IMG_5941.jpeg">
</div>

<div class="text">
  No es una marca.<br>
  Es un proceso de eliminación.<br>
  La forma es solo un contenedor.
</div>

</div>

<script>
function enterSite() {
  document.querySelector(".intro").style.display = "none";
  document.getElementById("main").style.display = "block";
}

/* EFECTO MATRIX / GLITCH */
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&";
const target = "ABSOLUTO PROJECTS";
let iteration = 0;

const interval = setInterval(() => {
  document.getElementById("logo").innerHTML =
    target
      .split("")
      .map((letter, index) => {
        if(letter === " ") return " ";
        if(index < iteration) return target[index];
        return letters[Math.floor(Math.random() * letters.length)];
      })
      .join("")
      .replace("PROJECTS", "<br>PROJECTS");

  if(iteration >= target.length){
    clearInterval(interval);
  }

  iteration += 1 / 3;
}, 60);
</script>

</body>
</html>
