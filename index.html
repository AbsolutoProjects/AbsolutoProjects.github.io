<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSOLUTO PROJECTS</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family: Helvetica, Arial, sans-serif;
}

/* INTRO */
.intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:9999;
  cursor:pointer;
}

#logo{
  font-size:16px;
  letter-spacing:8px;
  line-height:1.8;
  opacity:0.95;
  padding:20px;
}

/* CONTENIDO REAL */
.main{
  display:none;
}

.header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:20px;
  letter-spacing:10px;
  font-size:12px;
  z-index:10;
}

.hero{
  height:100vh;
  background:url('7.jpeg') center/cover no-repeat;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
}

.grid img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.text{
  padding:100px 20px;
  max-width:500px;
  margin:auto;
  text-align:center;
  font-size:13px;
  line-height:1.8;
  opacity:0.65;
}

/* móvil */
@media (max-width:700px){
  #logo{
    font-size:14px;
    letter-spacing:5px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .grid img{
    height:420px;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
  <div id="logo">ABSOLUTO<br>PROJECTS</div>
</div>

<!-- WEB -->
<div class="main" id="main">

<div class="header">ABSOLUTO</div>

<div class="hero"></div>

<div class="grid">
  <img src="7.jpeg">
  <img src="IMG_0587.jpeg">
  <img src="IMG_5847.jpeg">
  <img src="IMG_5941.jpeg">
</div>

<div class="text">
No es una marca.<br>
Es un proceso de eliminación.<br>
La forma es solo un contenedor.
</div>

</div>

<script>
function enterSite(){
  document.querySelector(".intro").style.display="none";
  document.getElementById("main").style.display="block";
}

/* SCRAMBLE MÍSTICO SOLO TIPOGRÁFICO */
const glyphs = [
"𓂀","☿","☽","☉","†","‡","✦","ᛟ","ᚨ","ᛉ",
"✠","⚶","⌘","⟁","☍","☌","✢","✣","✥","✧"
];

const target = "ABSOLUTO PROJECTS";
let iteration = 0;

const interval = setInterval(() => {

  const output = target.split("").map((char,index)=>{

    if(char === " ") return " ";

    if(index < iteration){
      return target[index];
    }

    return glyphs[Math.floor(Math.random()*glyphs.length)];

  }).join("");

  document.getElementById("logo").innerHTML =
    output.replace("PROJECTS","<br>PROJECTS");

  if(iteration >= target.length){
    clearInterval(interval);
  }

  iteration += 0.33;

},70);
</script>

</body>
</html>
