<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSOLUTO PROJECTS</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Garamond, serif;
}

/* INTRO */
.intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:9999;
  cursor:pointer;
  opacity:1;
  transition:opacity 1.8s ease;
}

.intro.fadeout{
  opacity:0;
  pointer-events:none;
}

#logo{
  font-size:16px;
  letter-spacing:4px;
  white-space:nowrap;
  opacity:0.95;
}

/* CONTENIDO */
.main{
  display:none;
  opacity:0;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-sizing:border-box;
  background:rgba(0,0,0,0.75);
}

.brand{
  font-size:12px;
  letter-spacing:8px;
}

/* HAMBURGUESA */
.menu-btn{
  width:28px;
  cursor:pointer;
}

.menu-btn span{
  display:block;
  height:1px;
  background:white;
  margin:7px 0;
  opacity:0.8;
}

/* MENÚ LATERAL */
.side-menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100vh;
  background:black;
  z-index:200;
  padding:120px 40px;
  box-sizing:border-box;
  transition:0.5s ease;
}

.side-menu.open{
  right:0;
}

.side-menu a{
  display:block;
  color:white;
  text-decoration:none;
  margin-bottom:28px;
  font-size:18px;
  opacity:0.6;
  transition:0.3s;
}

.side-menu a:hover,
.side-menu a.active{
  opacity:1;
}

/* PÁGINAS */
.page{
  display:none;
  padding:110px 20px 60px;
  min-height:100vh;
}

.page.active{
  display:block;
}

/* HERO */
.hero{
  height:70vh;
  background:url('7.jpeg') center/cover no-repeat;
  margin-bottom:30px;
}

/* TEXTO */
.text{
  max-width:600px;
  margin:auto;
  text-align:center;
  line-height:1.8;
  font-size:15px;
  opacity:0.7;
}

/* GALERÍAS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
}

.grid img{
  width:100%;
  height:320px;
  object-fit:cover;
}

/* móvil */
@media (max-width:700px){

  #logo{
    font-size:14px;
    letter-spacing:3px;
  }

  .brand{
    font-size:11px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .grid img{
    height:420px;
  }

  .side-menu{
    width:220px;
    right:-220px;
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgmusic" loop>
<source src="ambient.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
<div id="logo">ABSOLUTO PROJECTS</div>
</div>

<!-- WEB -->
<div class="main" id="main">

<!-- HEADER -->
<div class="header">
<div class="brand">ABSOLUTO</div>

<div class="menu-btn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>
</div>

<!-- MENÚ -->
<div class="side-menu" id="sideMenu">
<a href="#" class="active" onclick="showPage('about',this)">Acerca</a>
<a href="#" onclick="showPage('process',this)">Procesos</a>
<a href="#" onclick="showPage('gallery',this)">Galería</a>
</div>

<!-- ACERCA -->
<section id="about" class="page active">
<div class="hero"></div>

<div class="text">
Absoluto Projects es una exploración de identidad,
anonimato y transformación.<br><br>

La prenda como contenedor.<br>
El proceso como lenguaje.
</div>
</section>

<!-- PROCESOS -->
<section id="process" class="page">
<div class="grid">
<img src="7.jpeg">
<img src="IMG_0587.jpeg">
<img src="IMG_5847.jpeg">
<img src="IMG_5941.jpeg">
</div>
</section>

<!-- GALERÍA -->
<section id="gallery" class="page">
<div class="grid">
<img src="IMG_0587.jpeg">
<img src="IMG_5941.jpeg">
<img src="7.jpeg">
<img src="IMG_5847.jpeg">
</div>
</section>

</div>

<script>
/* INTRO */
function enterSite(){

const intro = document.querySelector(".intro");
const main = document.getElementById("main");
const music = document.getElementById("bgmusic");

music.volume = 0.15;
music.play();

intro.classList.add("fadeout");

setTimeout(()=>{
intro.style.display="none";
main.style.display="block";

setTimeout(()=>{
main.style.transition="opacity 2s ease";
main.style.opacity="1";
},50);

},1800);
}

/* MENÚ */
function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("open");
}

/* PÁGINAS */
function showPage(id,el){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
});

document.getElementById(id).classList.add('active');

document.querySelectorAll('.side-menu a').forEach(a=>{
a.classList.remove('active');
});

el.classList.add('active');

document.getElementById("sideMenu").classList.remove("open");
}

/* SCRAMBLE */
const glyphs = [
"𓂀","☿","☽","☉","†","‡","✦","ᛟ","ᚨ","ᛉ",
"✠","⚶","⌘","⟁","☍","☌","✢","✣","✥","✧"
];

const target = "ABSOLUTO PROJECTS";
let iteration = 0;

const interval = setInterval(()=>{

const output = target.split("").map((char,index)=>{

if(char===" ") return " ";

if(index < iteration){
return target[index];
}

return glyphs[Math.floor(Math.random()*glyphs.length)];

}).join("");

document.getElementById("logo").innerHTML = output;

if(iteration >= target.length){
clearInterval(interval);
}

iteration += 0.33;

},70);
</script>

</body>
</html>
